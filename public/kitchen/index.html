<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cocina — Pedidos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🍕 Pedidos en Cola</h1>
    <div class="header-right">
      <span id="clock"></span>
      <span id="order-count">0 pedidos</span>
    </div>
  </header>

  <!-- Column headers -->
  <div class="table-header">
    <span class="col-num">#</span>
    <span class="col-time">HORA</span>
    <span class="col-order">PEDIDO</span>
  </div>

  <!-- Order rows go here -->
  <main id="orders-container">
    <p class="empty-message">Sin pedidos pendientes — ¡todo tranquilo!</p>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
