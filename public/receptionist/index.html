<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recepción — Pedidos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOP NAV -->
  <header>
    <h1>🍕 Joselo's Pizza — Recepción</h1>
    <div class="header-actions">
      <button id="btn-summary" class="btn-header">📊 Resumen del Día</button>
      <button id="btn-connect-printer" class="btn-printer">🔌 Conectar Impresora</button>
      <span id="printer-status" class="printer-status disconnected">● Desconectada</span>
    </div>
  </header>

  <div class="layout">

    <!-- LEFT PANEL: ORDER BUILDER -->
    <section class="order-builder">
      <h2 id="builder-title">Nuevo Pedido</h2>

      <!-- Category Tabs -->
      <div class="category-tabs">
        <button class="tab active" data-category="pizzas">🍕 Pizzas</button>
        <button class="tab" data-category="sides">🧄 Pan con Ajo</button>
        <button class="tab" data-category="beverages">🥤 Bebidas</button>
        <button class="tab" data-category="specials">⭐ Especiales</button>
      </div>

      <!-- Menu Items Grid -->
      <div id="menu-grid" class="menu-grid"></div>

      <!-- Pizza Customization Modal -->
      <div id="pizza-modal" class="modal hidden">
        <div class="modal-content">
          <h3 id="modal-pizza-name"></h3>
          <p id="modal-pizza-price" class="modal-price"></p>

          <div id="custom-price-section" class="custom-price-section hidden">
            <label for="custom-price">Precio:</label>
            <input type="number" id="custom-price" min="0" step="10" 
                   placeholder="0" class="input-field input-short">
          </div>

          <div class="modifier-section">
            <label class="checkbox-label">
              <input type="checkbox" id="mod-orilla">
              Orilla de Queso (+\$60)
            </label>
          </div>

          <div class="extras-section">
            <h4>Ingredientes Extra (+\$30 c/u)</h4>
            <div id="extras-grid" class="extras-grid"></div>
          </div>

          <div class="quantity-section">
            <button id="qty-minus" class="btn-qty">−</button>
            <span id="qty-value">1</span>
            <button id="qty-plus" class="btn-qty">+</button>
          </div>

          <input type="text" id="item-notes" placeholder="Notas (ej: bien cocida)"
                 class="input-notes">

          <div class="modal-actions">
            <button id="modal-cancel" class="btn-cancel">Cancelar</button>
            <button id="modal-add" class="btn-add">Agregar al Pedido</button>
          </div>
        </div>
      </div>

      <!-- Order Details -->
      <div class="order-details">
        <input type="text" id="client-name"
               placeholder="👤 Nombre del cliente" class="input-field">
        <input type="tel" id="client-phone"
               placeholder="📞 Número del cliente" class="input-field">
        <input type="text" id="delivery-address"
               placeholder="📍 Dirección de entrega" class="input-field">
        <div class="delivery-fee-row">
          <label for="delivery-fee">🚗 Envío:</label>
          <input type="number" id="delivery-fee"
                 placeholder="0" min="0" step="10"
                 inputmode="numeric" pattern="[0-9]*"
                 class="input-field input-short">
        </div>
        <input type="text" id="order-notes"
               placeholder="📝 Notas generales del pedido" class="input-field">
      </div>

    </section>

    <!-- RIGHT PANEL: CURRENT ORDER + ACTIVE ORDERS -->
    <aside class="sidebar">

      <!-- Current Order Being Built -->
      <div class="current-order">
        <h3 id="cart-title">Pedido Actual</h3>
        <div id="current-items" class="current-items">
          <p class="empty-cart">Agrega productos del menú</p>
        </div>
        <div class="order-total">
          <span>Subtotal:</span>
          <span id="order-total">\$0</span>
        </div>
        <button id="btn-send-order" class="btn-send" disabled>
          Enviar a Cocina 🔥
        </button>
        <button id="btn-cancel-edit" class="btn-cancel-edit hidden">
          ✕ Cancelar Edición
        </button>
      </div>

      <!-- Active Orders -->
      <div class="active-orders">
        <h3>Pedidos Activos</h3>
        <div id="active-orders-list"></div>
      </div>

    </aside>

  </div>

  <!-- Summary Modal -->
  <div id="summary-modal" class="modal hidden">
    <div class="modal-content modal-wide">
      <div class="summary-tabs">
        <button class="summary-tab active" data-view="today">📊 Hoy</button>
        <button class="summary-tab" data-view="history">📋 Pedidos del Día</button>
        <button class="summary-tab" data-view="week">📅 Semana</button>
      </div>
      <div id="summary-content"></div>
      <button id="summary-close" class="btn-cancel">Cerrar</button>
    </div>
  </div>

  <!-- Ticket Modal -->
  <div id="ticket-modal" class="modal hidden">
    <div class="modal-content ticket-content">
      <div id="ticket-body"></div>
      <div class="modal-actions">
        <button id="ticket-print" class="btn-add">🖨️ Imprimir</button>
        <button id="ticket-close" class="btn-cancel">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- Admin Button -->
  <button id="btn-admin" class="btn-admin">⚙️</button>

  <!-- Admin Modal -->
  <div id="admin-modal" class="modal hidden">
    <div class="modal-content modal-admin">
      <h3>⚙️ Editar Menú</h3>
      <p class="admin-hint">Edita directamente el archivo menu.js. 
         Cuidado con la sintaxis — comas, comillas y corchetes importan.</p>
      <textarea id="menu-editor" class="menu-editor" spellcheck="false"></textarea>
      <div class="modal-actions">
        <button id="admin-cancel" class="btn-cancel">Cancelar</button>
        <button id="admin-save" class="btn-add">💾 Guardar y Recargar</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/menu.js"></script>
  <script src="app.js"></script>
</body>
</html>
